version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: trend_mysql
    restart: always
    environment:
      MYSQL_DATABASE: trendsepetix_db
      MYSQL_USER: trend_user
      MYSQL_PASSWORD: trend_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=mysql://trend_user:trend_password@db:3306/trendsepetix_db
    depends_on:
      - db

volumes:
  mysql_data:
